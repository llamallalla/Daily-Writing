<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>功课</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f4efe5;font-family:'Cormorant Garamond',Georgia,serif;color:#1e1810;max-width:480px;margin:0 auto;padding-bottom:100px;}
textarea,input{font-family:'Cormorant Garamond',Georgia,serif;color:#1e1810;background:transparent;border:none;outline:none;-webkit-appearance:none;}
textarea::placeholder,input::placeholder{color:#b0a488;}
button{cursor:pointer;font-family:'Cormorant Garamond',Georgia,serif;-webkit-appearance:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.65;}}

.section{padding:24px 24px 28px;border-bottom:1px solid #d8cebc;}
.sec-label{font-size:10px;letter-spacing:.22em;color:#8a7860;text-transform:uppercase;margin-bottom:16px;}
.hscroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;}

#hdr{padding:44px 24px 20px;border-bottom:1px solid #d8cebc;display:flex;justify-content:space-between;align-items:flex-start;}
#app-title{font-size:52px;font-family:‘Noto Serif SC’,serif;font-weight:300;letter-spacing:.06em;line-height:1;}
#date-str{font-size:13px;color:#8a7860;margin-top:8px;font-style:italic;}
#new-day-btn{background:none;border:1px solid #d8cebc;border-radius:6px;padding:8px 14px;font-size:12px;color:#8a7860;font-family:‘Noto Serif SC’,serif;line-height:1.4;text-align:center;margin-top:6px;}

.scol{min-width:138px;flex:0 0 138px;}
.scol-title{font-size:17px;font-family:‘Noto Serif SC’,serif;}
.scol-sub{font-size:10px;color:#8a7860;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;}
.sentry{margin-bottom:8px;}
.sentry textarea{width:100%;background:rgba(255,255,255,.52);border:1px solid #d8cebc;border-radius:4px;padding:6px 8px;font-size:13px;resize:none;line-height:1.6;display:block;}
.sentry input{width:100%;border-bottom:1px solid #d8cebc;padding:2px 0;font-size:11px;color:#8a7860;font-style:italic;display:block;}
.sadd{width:100%;background:none;border:1px dashed #d8cebc;border-radius:4px;color:#8a7860;font-size:18px;padding:4px 0;line-height:1;}

.pcol{min-width:118px;flex:0 0 118px;border-radius:6px;padding:12px 10px;cursor:pointer;transition:border-color .2s;}
.pcol-name{font-size:13px;font-family:‘Noto Serif SC’,serif;line-height:1.4;margin-bottom:6px;word-break:break-all;}
.pcol-meta{display:flex;justify-content:space-between;}
.pcol-days,.pcol-cnt{font-size:10px;opacity:.6;}
#pexpand{margin-top:14px;display:none;}
.pwrite-box{background:rgba(255,255,255,.52);border-radius:8px;overflow:hidden;}
.pprev{border-bottom:1px solid #d8cebc;padding:14px 18px;max-height:180px;overflow-y:auto;}
.pprev-lbl{font-size:9px;letter-spacing:.2em;color:#8a7860;text-transform:uppercase;margin-bottom:10px;}
.pprev-time{font-size:10px;color:#8a7860;margin-bottom:3px;}
.pprev-txt{font-size:13px;color:#4a3c28;line-height:1.7;white-space:pre-wrap;opacity:.85;}
.pwrite{padding:18px;}
.pwrite-lbl{font-size:10px;color:#8a7860;font-style:italic;margin-bottom:10px;}
.pwrite textarea{width:100%;font-size:15px;line-height:1.85;resize:vertical;border-bottom:1px solid #d8cebc;padding-bottom:12px;margin-bottom:12px;min-height:120px;}
.psave-btn{background:#2a2018;color:#f4efe5;border:none;border-radius:4px;padding:8px 22px;font-size:13px;font-family:‘Noto Serif SC’,serif;transition:background .3s;}
#pform{margin-top:14px;background:rgba(255,255,255,.52);border:1px solid #d8cebc;border-radius:8px;padding:18px;display:none;}
#pform input{width:100%;border-bottom:1px solid #d8cebc;padding:6px 0;font-size:17px;font-family:‘Noto Serif SC’,serif;margin-bottom:14px;}
.days-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.days-lbl{font-size:11px;color:#8a7860;font-style:italic;}
.dopt{border:1px solid #d8cebc;border-radius:4px;padding:4px 12px;font-size:12px;color:#8a7860;background:transparent;}
.dopt.on{background:#2a2018;border-color:#2a2018;color:#f4efe5;}
.fbtns{display:flex;gap:8px;}
.fprimary{background:#2a2018;color:#f4efe5;border:none;border-radius:4px;padding:8px 22px;font-size:13px;font-family:‘Noto Serif SC’,serif;}
.fcancel{background:transparent;color:#8a7860;border:1px solid #d8cebc;border-radius:4px;padding:8px 16px;font-size:13px;}

#tbrow{display:flex;gap:10px;margin-bottom:20px;}
.tbtn{flex:1;border:1px solid #d8cebc;border-radius:6px;padding:14px 4px;background:transparent;line-height:1.2;}
.tbtn.on{background:#2a2018;border-color:#2a2018;}
.tnum{font-size:30px;color:#4a3c28;font-weight:300;}
.tbtn.on .tnum{color:#f4efe5;}
.tunit{font-size:10px;color:#8a7860;letter-spacing:.14em;text-transform:uppercase;}
.tbtn.on .tunit{color:rgba(244,239,229,.6);}
#excard{background:rgba(255,255,255,.52);border:1px solid #d8cebc;border-radius:8px;padding:20px;display:none;}
.ex-auth{font-size:10px;letter-spacing:.2em;color:#8a7860;text-transform:uppercase;margin-bottom:4px;}
.ex-ttl{font-size:21px;font-style:italic;margin-bottom:12px;}
.ex-instr{font-size:14px;color:#4a3c28;line-height:1.75;border-left:2px solid #d8cebc;padding-left:14px;margin-bottom:18px;}
#ptags-wrap{margin-bottom:16px;display:none;}
.ptag-lbl{font-size:10px;color:#8a7860;font-style:italic;margin-bottom:8px;}
#ptags-row{display:flex;flex-wrap:wrap;gap:6px;}
.ptag{border:1px solid #d8cebc;border-radius:4px;padding:4px 12px;font-size:12px;color:#4a3c28;background:transparent;font-family:‘Noto Serif SC’,serif;}
.ptag.on{background:#2a2018;border-color:#2a2018;color:#f4efe5;}
.trow{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
#tdisplay{font-size:26px;font-variant-numeric:tabular-nums;}
.tctrl{background:none;border:none;color:#8a7860;font-size:12px;font-style:italic;}
#ptext{width:100%;min-height:200px;border-top:1px solid #d8cebc;padding-top:16px;font-size:16px;line-height:1.85;resize:vertical;}
.srow{margin-top:14px;display:flex;gap:10px;align-items:center;}
#psave{background:#2a2018;color:#f4efe5;border:none;border-radius:4px;padding:10px 28px;font-size:13px;font-family:‘Noto Serif SC’,serif;transition:background .3s;}
.shint{font-size:11px;color:#8a7860;font-style:italic;}
#sess-list-wrap{margin-top:20px;display:none;}
.sess-item{border-left:2px solid #d8cebc;padding-left:14px;margin-bottom:14px;}
.sess-meta{font-size:11px;color:#8a7860;margin-bottom:4px;}
.sess-prev{font-size:13px;color:#4a3c28;line-height:1.7;white-space:pre-wrap;}

#footer{padding:24px;}
#expbtn{width:100%;background:#2a2018;color:#f4efe5;border:none;border-radius:6px;padding:16px 0;font-size:14px;letter-spacing:.12em;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(30,24,16,.75);z-index:100;display:none;align-items:center;justify-content:center;}
.overlay.bot{align-items:flex-end;justify-content:center;}
.modal{background:#f4efe5;border-radius:16px;padding:36px 32px;max-width:320px;width:90%;text-align:center;}
.modal-ttl{font-size:28px;font-family:‘Noto Serif SC’,serif;margin-bottom:12px;}
.modal-body{font-size:14px;color:#4a3c28;line-height:1.75;margin-bottom:28px;}
.modal-note{font-style:italic;color:#8a7860;}
.mbtns{display:flex;gap:10px;}
.mcancel{flex:1;background:transparent;border:1px solid #d8cebc;border-radius:6px;padding:12px 0;font-size:13px;color:#8a7860;}
.mconfirm{flex:1;background:#2a2018;border:none;border-radius:6px;padding:12px 0;font-size:13px;color:#f4efe5;font-family:‘Noto Serif SC’,serif;}

/* EXPORT — full screen for easy screenshot */
#emodal{position:fixed;inset:0;background:#f8f3ea;z-index:100;display:none;flex-direction:column;}
#emodal-hdr{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 0;flex-shrink:0;border-bottom:1px solid #d8cebc;padding-bottom:16px;}
.sttl{font-size:13px;font-family:‘Noto Serif SC’,serif;}
.sclose{background:none;border:none;color:#8a7860;font-size:24px;line-height:1;padding:0;}
.stabs{display:flex;gap:6px;padding:16px 24px 0;flex-shrink:0;}
.stab{flex:1;border:1px solid #d8cebc;border-radius:4px;padding:8px 0;font-size:11px;color:#8a7860;background:transparent;}
.stab.on{background:#2a2018;border-color:#2a2018;color:#f4efe5;}

/* PREVIEW TAB — scrollable card, screenshot this */
#tab-prev{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:16px;}
#ecard{background:#f8f3ea;font-family:‘Cormorant Garamond’,Georgia,serif;color:#1e1810;padding:36px 24px 52px;border:1px solid #d8cebc;border-radius:12px;}

/* TEXT TAB */
#tab-txt{flex:1;overflow-y:auto;display:none;padding:16px;}
#etextbox{width:100%;height:100%;min-height:400px;background:#fff;border:1px solid #d8cebc;border-radius:12px;padding:20px;font-size:13px;line-height:1.8;color:#4a3c28;font-family:monospace;resize:none;}
#tab-txt-footer{padding:16px 24px 32px;flex-shrink:0;display:none;}
#copybtn{width:100%;background:#2a2018;color:#f4efe5;border:none;border-radius:6px;padding:14px 0;font-size:13px;letter-spacing:.1em;transition:background .3s;}
#copybtn.done{background:#3d5a38;}

/* preview footer hint */
#tab-prev-footer{padding:12px 24px 32px;flex-shrink:0;text-align:center;display:none;}
.sftr-hint{font-size:11px;color:#8a7860;font-style:italic;}

/* EXPORT CARD STYLES */
.ec-top{text-align:center;margin-bottom:30px;}
.ec-badge{font-size:11px;letter-spacing:.32em;color:#8a7860;text-transform:uppercase;margin-bottom:10px;}
.ec-date{font-size:15px;color:#4a3c28;font-style:italic;}
.ec-rule{width:36px;height:1px;background:#d8cebc;margin:16px auto 0;}
.ec-slbl{font-size:9px;letter-spacing:.28em;color:#8a7860;text-transform:uppercase;text-align:center;margin-bottom:18px;}
.ec-div{width:100%;height:1px;background:linear-gradient(to right,transparent,#c8b898,transparent);margin:22px 0;}
.ec-ft{text-align:center;margin-top:36px;}
.ec-ftrule{width:24px;height:1px;background:#d8cebc;margin:0 auto 10px;}
.ec-ftmark{font-size:9px;letter-spacing:.3em;color:#8a7860;text-transform:uppercase;}
</style>

</head>
<body>

<div id="hdr">
  <div>
    <div id="app-title">功课</div>
    <div id="date-str"></div>
  </div>
  <button id="new-day-btn">新的<br/>一天</button>
</div>

<div class="section">
  <div class="sec-label">感知 · Noticing</div>
  <div class="hscroll" id="sscroll"></div>
</div>

<div class="section">
  <div class="sec-label">进行中 · Projects</div>
  <div class="hscroll" id="pscroll"></div>
  <div id="pexpand"></div>
  <div id="pform">
    <input id="pname" placeholder="项目名称"/>
    <div class="days-row">
      <span class="days-lbl">到期</span>
      <button class="dopt on" data-d="3">3天</button>
      <button class="dopt" data-d="7">7天</button>
      <button class="dopt" data-d="14">14天</button>
    </div>
    <div class="fbtns">
      <button class="fprimary" id="pform-ok">添加</button>
      <button class="fcancel" id="pform-cancel">取消</button>
    </div>
  </div>
</div>

<div class="section">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <div class="sec-label" style="margin-bottom:0">练习 · Practice</div>
    <div id="scnt" style="font-size:11px;color:#8a7860;font-style:italic;"></div>
  </div>
  <div id="tbrow">
    <button class="tbtn" data-t="2"><div class="tnum">2</div><div class="tunit">min</div></button>
    <button class="tbtn" data-t="10"><div class="tnum">10</div><div class="tunit">min</div></button>
    <button class="tbtn" data-t="60"><div class="tnum">60</div><div class="tunit">min</div></button>
  </div>
  <div id="excard">
    <div class="ex-auth" id="ex-auth"></div>
    <div class="ex-ttl" id="ex-ttl"></div>
    <div class="ex-instr" id="ex-instr"></div>
    <div id="ptags-wrap">
      <div class="ptag-lbl">or work on —</div>
      <div id="ptags-row"></div>
    </div>
    <div class="trow">
      <span id="tdisplay">0:00</span>
      <button class="tctrl" id="tpause">pause</button>
      <button class="tctrl" id="treset" style="font-size:11px;">reset</button>
    </div>
    <textarea id="ptext" placeholder="begin here…"></textarea>
    <div class="srow">
      <button id="psave">保存练习</button>
      <span class="shint">保存后可再开新练习</span>
    </div>
  </div>
  <div id="sess-list-wrap">
    <div class="sec-label" style="margin-bottom:12px;">今日已保存</div>
    <div id="sess-list"></div>
  </div>
</div>

<div id="footer">
  <button id="expbtn">导出今日 · Export Today</button>
</div>

<!-- NEW DAY MODAL -->

<div class="overlay" id="ndmodal">
  <div class="modal">
    <div class="modal-ttl">新的一天</div>
    <div class="modal-body">感知日志、练习记录和项目笔记将全部清空。项目卡片会保留。<br/><br/><span class="modal-note">建议先导出今日存档。</span></div>
    <div class="mbtns">
      <button class="mcancel" id="nd-cancel">取消</button>
      <button class="mconfirm" id="nd-ok">确认开始</button>
    </div>
  </div>
</div>

<!-- EXPORT — full screen -->

<div id="emodal">
  <div id="emodal-hdr">
    <div class="sttl">今日存档</div>
    <button class="sclose" id="eclose">×</button>
  </div>
  <div class="stabs">
    <button class="stab on" data-tab="prev">截图存档</button>
    <button class="stab" data-tab="txt">复制文本</button>
  </div>
  <!-- PREVIEW -->
  <div id="tab-prev">
    <div id="ecard"></div>
  </div>
  <div id="tab-prev-footer">
    <div class="sftr-hint">滚动查看全文 · 截图保存</div>
  </div>
  <!-- TEXT -->
  <div id="tab-txt">
    <textarea id="etextbox" readonly></textarea>
  </div>
  <div id="tab-txt-footer">
    <button id="copybtn">复制全文</button>
  </div>
</div>

<script>
var EX={
  2:[
    {title:"Spiral Warmup",author:"Lynda Barry",instruction:"Hold one word or image from your day. Draw a spiral in your mind. Write whatever surfaces — don't stop the hand. No sentences required."},
    {title:"Quick List",author:"Sei Shonagon",instruction:"Write a list: things that made your heart beat faster today. Five items, no explanations. Let the list be strange."},
    {title:"One Sense, Now",author:"Practice",instruction:"Pick the sense most alive in this moment. Two or three lines only — present tense, completely specific, no interpretation."}
  ],
  10:[
    {title:"Daily Diary",author:"Lynda Barry",instruction:"Three columns in your mind: DID (7 things from last 24 hours) / SAW (7 things) / OVERHEARD (1 thing). Write fast. No editing."},
    {title:"X-Page",author:"Lynda Barry",instruction:"Pick an object or image from today. Spend 4 minutes filling the page with present-tense sensory details. Then write from it for 6 minutes."},
    {title:"Locate Yourself",author:"Annie Dillard",instruction:"Where are you right now? Write it with complete specificity — surface appearances, five senses, the history of this place. Don't describe feelings."}
  ],
  60:[
    {title:"Memory Recall",author:"Lynda Barry",instruction:"List ten instances of one thing from your past — kitchens, a recurring sound, cars. Pick the one that surfaces fastest. X-page it for 4 minutes. Then write the full scene."},
    {title:"Write About Winter in Summer",author:"Annie Dillard",instruction:"Write about something absent — out of season, out of reach, not here. Begin with what is present and let the absent thing arrive."},
    {title:"List Into Essay",author:"Sei Shonagon",instruction:"Begin: things that are near though distant / things that create the appearance of deep feeling. Write until one item opens into a door. Follow it."}
  ]
};
var SENSES=["sight","sound","smell","taste","touch"];
var SZH={sight:"所见",sound:"所闻",smell:"所嗅",taste:"所尝",touch:"所触"};

function ld(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var slog=ld("gk_s",{sight:[],sound:[],smell:[],taste:[],touch:[]});
var projs=ld("gk_p",[]);
var sess=ld("gk_sess",[]);
var pents=ld("gk_pe",{});
var pdrafts={};
var selTime=null,curEx=null,activePid=null,expandPid=null,selDays=3;
var timerSec=0,timerOn=false,timerIv=null;

function fmt(s){return Math.floor(s/60)+":"+("0"+s%60).slice(-2);}
function ageStyle(ca,ea){
  var pct=Math.max(0,(ea-Date.now())/(ea-ca));
  if(pct>.6)return{bg:"#dde8d8",br:"#9db89a",ac:"#3d5a38",pulse:false};
  if(pct>.35)return{bg:"#ede8d0",br:"#c8b870",ac:"#5a4010",pulse:false};
  if(pct>.12)return{bg:"#ede0c8",br:"#c88840",ac:"#5a2808",pulse:false};
  return{bg:"#edd8c8",br:"#c84830",ac:"#4a1008",pulse:true};
}
function purge(){projs=projs.filter(function(p){return p.ea>Date.now();});}
function timeStr(){return new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});}

document.getElementById("date-str").textContent=new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});

// SENSE
function renderSense(){
  var sc=document.getElementById("sscroll");
  sc.innerHTML="";
  SENSES.forEach(function(s){
    var col=document.createElement("div");col.className="scol";
    var t=document.createElement("div");t.className="scol-title";t.textContent=SZH[s];
    var sub=document.createElement("div");sub.className="scol-sub";sub.textContent=s;
    col.appendChild(t);col.appendChild(sub);
    var entries=slog[s]||[];
    entries.forEach(function(en,i){
      var wrap=document.createElement("div");wrap.className="sentry";
      var ta=document.createElement("textarea");ta.rows=3;ta.placeholder="noticed…";ta.value=en.text||"";
      (function(si,ii){ta.oninput=function(){slog[si][ii].text=this.value;sv("gk_s",slog);};})(s,i);
      var inp=document.createElement("input");inp.placeholder="where";inp.value=en.loc||"";
      (function(si,ii){inp.oninput=function(){slog[si][ii].loc=this.value;sv("gk_s",slog);};})(s,i);
      wrap.appendChild(ta);wrap.appendChild(inp);col.appendChild(wrap);
    });
    var ab=document.createElement("button");ab.className="sadd";ab.textContent="+";
    (function(si){ab.onclick=function(){slog[si].push({id:Date.now(),text:"",loc:""});sv("gk_s",slog);renderSense();};})(s);
    col.appendChild(ab);sc.appendChild(col);
  });
}
renderSense();

// PROJECTS
function renderProjs(){
  purge();
  var sc=document.getElementById("pscroll");sc.innerHTML="";
  projs.forEach(function(p){
    var ag=ageStyle(p.ca,p.ea);
    var dl=Math.ceil((p.ea-Date.now())/86400000);
    var cnt=(pents[p.id]||[]).length;
    var isOpen=expandPid===p.id;
    var card=document.createElement("div");card.className="pcol";
    card.style.background=ag.bg;card.style.border="1px solid "+(isOpen?ag.ac:ag.br);
    if(ag.pulse)card.style.animation="pulse 2s ease-in-out infinite";
    var nm=document.createElement("div");nm.className="pcol-name";nm.style.color=ag.ac;nm.textContent=p.title;
    var mt=document.createElement("div");mt.className="pcol-meta";
    var dl2=document.createElement("span");dl2.className="pcol-days";dl2.style.color=ag.ac;dl2.textContent=dl+"d left";
    mt.appendChild(dl2);
    if(cnt>0){var cn=document.createElement("span");cn.className="pcol-cnt";cn.style.color=ag.ac;cn.textContent=cnt+" notes";mt.appendChild(cn);}
    card.appendChild(nm);card.appendChild(mt);
    (function(pid){card.onclick=function(){expandPid=(expandPid===pid?null:pid);renderProjs();renderExpand();};})(p.id);
    sc.appendChild(card);
  });
  var ab=document.createElement("button");
  ab.style.cssText="min-width:80px;flex:0 0 80px;background:transparent;border:1px dashed #d8cebc;border-radius:6px;padding:12px 8px;color:#8a7860;font-size:12px;font-family:'Noto Serif SC',serif;line-height:1.5;cursor:pointer;";
  ab.textContent="+ 新项目";
  ab.onclick=function(){document.getElementById("pform").style.display="block";document.getElementById("pname").focus();};
  sc.appendChild(ab);
  renderPTags();
}

function renderExpand(){
  var wrap=document.getElementById("pexpand");
  if(!expandPid){wrap.style.display="none";wrap.innerHTML="";return;}
  var p=null;for(var i=0;i<projs.length;i++){if(projs[i].id===expandPid){p=projs[i];break;}}
  if(!p){wrap.style.display="none";return;}
  var ag=ageStyle(p.ca,p.ea);
  var entries=pents[p.id]||[];
  var draft=pdrafts[p.id]||"";
  wrap.style.display="block";
  var box=document.createElement("div");box.className="pwrite-box";box.style.border="1px solid "+ag.br;
  if(entries.length>0){
    var prev=document.createElement("div");prev.className="pprev";
    var lbl=document.createElement("div");lbl.className="pprev-lbl";lbl.textContent="今日已写";prev.appendChild(lbl);
    entries.forEach(function(e,i){
      var t=document.createElement("div");t.className="pprev-time";t.textContent=e.at;
      var tx=document.createElement("div");tx.className="pprev-txt";tx.textContent=e.text.length>100?e.text.slice(0,100)+"…":e.text;
      var ei=document.createElement("div");if(i<entries.length-1)ei.style.marginBottom="12px";
      ei.appendChild(t);ei.appendChild(tx);prev.appendChild(ei);
    });
    box.appendChild(prev);
  }
  var pw=document.createElement("div");pw.className="pwrite";
  var lbl2=document.createElement("div");lbl2.className="pwrite-lbl";lbl2.textContent=entries.length>0?"继续写 —":p.title;
  var ta=document.createElement("textarea");ta.rows=6;ta.placeholder="write here…";ta.value=draft;
  ta.style.cssText="width:100%;font-size:15px;line-height:1.85;resize:vertical;border-bottom:1px solid #d8cebc;padding-bottom:12px;margin-bottom:12px;font-family:'Cormorant Garamond',serif;color:#1e1810;background:transparent;border-top:none;border-left:none;border-right:none;outline:none;";
  (function(pid){ta.oninput=function(){pdrafts[pid]=this.value;};})(p.id);
  var btn=document.createElement("button");btn.className="psave-btn";btn.textContent="保存";
  (function(pid,b){b.onclick=function(){
    var d=(pdrafts[pid]||"").trim();if(!d)return;
    if(!pents[pid])pents[pid]=[];
    pents[pid].push({id:Date.now(),text:d,at:timeStr()});
    pdrafts[pid]="";sv("gk_pe",pents);
    b.textContent="✓ 已保存";b.style.background="#3d5a38";
    setTimeout(function(){renderProjs();renderExpand();},900);
  };})(p.id,btn);
  pw.appendChild(lbl2);pw.appendChild(ta);pw.appendChild(btn);
  box.appendChild(pw);wrap.innerHTML="";wrap.appendChild(box);
}
renderProjs();renderExpand();

document.querySelectorAll(".dopt").forEach(function(b){
  b.onclick=function(){
    selDays=parseInt(b.getAttribute("data-d"));
    document.querySelectorAll(".dopt").forEach(function(x){x.classList.remove("on");});
    b.classList.add("on");
  };
});
document.getElementById("pform-ok").onclick=function(){
  var nm=document.getElementById("pname").value.trim();if(!nm)return;
  projs.push({id:Date.now(),title:nm,ca:Date.now(),ea:Date.now()+selDays*86400000});
  sv("gk_p",projs);document.getElementById("pname").value="";document.getElementById("pform").style.display="none";
  renderProjs();renderExpand();
};
document.getElementById("pform-cancel").onclick=function(){document.getElementById("pform").style.display="none";};

// PRACTICE
function renderPTags(){
  var wrap=document.getElementById("ptags-wrap");var row=document.getElementById("ptags-row");
  if(!projs.length){wrap.style.display="none";return;}
  wrap.style.display="block";row.innerHTML="";
  projs.forEach(function(p){
    var b=document.createElement("button");b.className="ptag"+(activePid===p.id?" on":"");b.textContent=p.title;
    (function(pid){b.onclick=function(){activePid=(activePid===pid?null:pid);renderPTags();};})(p.id);
    row.appendChild(b);
  });
}

function pickEx(t){
  selTime=t;
  document.querySelectorAll(".tbtn").forEach(function(b){b.classList.toggle("on",parseInt(b.getAttribute("data-t"))===t);});
  var pool=EX[t];curEx=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById("ex-auth").textContent=curEx.author;
  document.getElementById("ex-ttl").textContent=curEx.title;
  document.getElementById("ex-instr").textContent=curEx.instruction;
  document.getElementById("ptext").value="";
  document.getElementById("excard").style.display="block";
  activePid=null;renderPTags();
  timerSec=0;timerOn=true;updateTimer();
  clearInterval(timerIv);timerIv=setInterval(function(){timerSec++;updateTimer();},1000);
  document.getElementById("tpause").textContent="pause";
  document.getElementById("psave").textContent="保存练习";document.getElementById("psave").style.background="#2a2018";
}
document.querySelectorAll(".tbtn").forEach(function(b){b.onclick=function(){pickEx(parseInt(b.getAttribute("data-t")));};});

function updateTimer(){document.getElementById("tdisplay").textContent=fmt(timerSec);}
document.getElementById("tpause").onclick=function(){
  timerOn=!timerOn;
  if(timerOn){clearInterval(timerIv);timerIv=setInterval(function(){timerSec++;updateTimer();},1000);}
  else clearInterval(timerIv);
  this.textContent=timerOn?"pause":"resume";
};
document.getElementById("treset").onclick=function(){clearInterval(timerIv);timerOn=false;timerSec=0;updateTimer();document.getElementById("tpause").textContent="resume";};
document.getElementById("psave").onclick=function(){
  var txt=document.getElementById("ptext").value.trim();if(!txt)return;
  var ap=null;for(var i=0;i<projs.length;i++){if(projs[i].id===activePid){ap=projs[i];break;}}
  sess.push({id:Date.now(),et:curEx?curEx.title:"",au:curEx?curEx.author:"",pt:ap?ap.title:"",text:txt,dur:timerSec,at:timeStr()});
  sv("gk_sess",sess);clearInterval(timerIv);timerOn=false;
  this.textContent="✓ 已保存";this.style.background="#3d5a38";
  var self=this;
  setTimeout(function(){
    document.getElementById("excard").style.display="none";
    selTime=null;curEx=null;activePid=null;timerSec=0;
    document.querySelectorAll(".tbtn").forEach(function(b){b.classList.remove("on");});
    self.textContent="保存练习";self.style.background="#2a2018";
    renderSessList();
  },1200);
};
function renderSessList(){
  document.getElementById("scnt").textContent=sess.length>0?sess.length+" saved today":"";
  var wrap=document.getElementById("sess-list-wrap");var list=document.getElementById("sess-list");
  if(!sess.length){wrap.style.display="none";return;}
  wrap.style.display="block";list.innerHTML="";
  sess.forEach(function(s){
    var item=document.createElement("div");item.className="sess-item";
    var meta=document.createElement("div");meta.className="sess-meta";meta.textContent=s.at+" · "+s.et+(s.pt?" · "+s.pt:"")+" · "+fmt(s.dur);
    var prev=document.createElement("div");prev.className="sess-prev";prev.textContent=s.text.slice(0,120)+(s.text.length>120?"…":"");
    item.appendChild(meta);item.appendChild(prev);list.appendChild(item);
  });
}
renderSessList();

// NEW DAY
document.getElementById("new-day-btn").onclick=function(){document.getElementById("ndmodal").style.display="flex";};
document.getElementById("nd-cancel").onclick=function(){document.getElementById("ndmodal").style.display="none";};
document.getElementById("nd-ok").onclick=function(){
  slog={sight:[],sound:[],smell:[],taste:[],touch:[]};
  sess=[];pents={};pdrafts={};selTime=null;curEx=null;activePid=null;timerSec=0;timerOn=false;
  clearInterval(timerIv);expandPid=null;
  sv("gk_s",slog);sv("gk_sess",sess);sv("gk_pe",pents);
  document.getElementById("ndmodal").style.display="none";
  document.getElementById("excard").style.display="none";
  document.getElementById("pform").style.display="none";
  document.querySelectorAll(".tbtn").forEach(function(b){b.classList.remove("on");});
  renderSense();renderProjs();renderExpand();renderSessList();
};

// EXPORT
function buildCard(){
  var dateStr=new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  var hasSense=SENSES.some(function(s){return (slog[s]||[]).some(function(e){return e.text;});});
  var pm={};projs.forEach(function(p){pm[p.id]={p:p,ents:pents[p.id]||[],ss:[]};});
  sess.forEach(function(s){if(s.pt){var p=null;for(var i=0;i<projs.length;i++){if(projs[i].title===s.pt){p=projs[i];break;}}if(p&&pm[p.id])pm[p.id].ss.push(s);}});
  var hasProj=false;for(var k in pm){if(pm[k].ents.length||pm[k].ss.length){hasProj=true;break;}}
  var freeSess=sess.filter(function(s){return !s.pt;});

  var h='<div class="ec-top"><div class="ec-badge">功课</div><div class="ec-date">'+dateStr+'</div><div class="ec-rule"></div></div>';
  if(hasSense){
    h+='<div class="ec-slbl">感知 · Noticing</div>';
    SENSES.forEach(function(s){
      var ents=(slog[s]||[]).filter(function(e){return e.text;});if(!ents.length)return;
      h+='<div style="margin-bottom:18px"><div style="display:flex;align-items:baseline;margin-bottom:8px"><span style="font-size:14px;font-family:\'Noto Serif SC\',serif">'+SZH[s]+'</span><span style="font-size:9px;letter-spacing:.16em;color:#8a7860;text-transform:uppercase;margin-left:8px">'+s+'</span></div>';
      ents.forEach(function(e){h+='<div style="padding-left:12px;border-left:1px solid #d8cebc;margin-bottom:8px"><div style="font-size:14px;color:#4a3c28;line-height:1.75">'+e.text+'</div>'+(e.loc?'<div style="font-size:11px;color:#8a7860;font-style:italic;margin-top:2px">'+e.loc+'</div>':'')+'</div>';});
      h+='</div>';
    });
  }
  if(hasProj){
    if(hasSense)h+='<div class="ec-div"></div>';
    h+='<div class="ec-slbl">进行中 · Projects</div>';
    for(var k in pm){
      var obj=pm[k];if(!obj.ents.length&&!obj.ss.length)continue;
      var ag=ageStyle(obj.p.ca,obj.p.ea);
      h+='<div style="margin-bottom:28px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="width:7px;height:7px;border-radius:50%;background:'+ag.ac+';flex-shrink:0"></div><div style="font-size:16px;font-family:\'Noto Serif SC\',serif;color:'+ag.ac+'">'+obj.p.title+'</div><div style="flex:1;height:1px;background:'+ag.br+'"></div></div>';
      obj.ents.forEach(function(e){h+='<div style="margin-bottom:14px"><div style="font-size:10px;color:#8a7860;padding-left:16px;margin-bottom:5px">'+e.at+'</div><div style="font-size:14px;color:#4a3c28;line-height:1.85;white-space:pre-wrap;padding-left:16px">'+e.text+'</div></div>';});
      obj.ss.forEach(function(s){h+='<div style="margin-bottom:14px"><div style="font-size:10px;color:#8a7860;padding-left:16px;margin-bottom:5px">'+s.et+' · '+s.at+' · '+fmt(s.dur)+'</div><div style="font-size:14px;color:#4a3c28;line-height:1.85;white-space:pre-wrap;padding-left:16px">'+s.text+'</div></div>';});
      h+='</div>';
    }
  }
  if(freeSess.length){
    if(hasSense||hasProj)h+='<div class="ec-div"></div>';
    h+='<div class="ec-slbl">练习 · Practice</div>';
    freeSess.forEach(function(s){
      h+='<div style="margin-bottom:24px"><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px"><span style="font-size:15px;font-style:italic">'+s.et+'</span>'+(s.au?'<span style="font-size:10px;color:#8a7860">— '+s.au+'</span>':'')+'</div><div style="font-size:10px;color:#8a7860;margin-bottom:8px">'+s.at+' · '+fmt(s.dur)+'</div><div style="font-size:14px;color:#4a3c28;line-height:1.85;white-space:pre-wrap;border-left:1px solid #d8cebc;padding-left:14px">'+s.text+'</div></div>';
    });
  }
  h+='<div class="ec-ft"><div class="ec-ftrule"></div><div class="ec-ftmark">功课</div></div>';
  return h;
}

function buildText(){
  var date=new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  var out="功课  "+date+"\n────────────────────────────\n\n";
  var hasSense=SENSES.some(function(s){return (slog[s]||[]).some(function(e){return e.text;});});
  if(hasSense){
    out+="感知 · Noticing\n\n";
    SENSES.forEach(function(s){
      var ents=(slog[s]||[]).filter(function(e){return e.text;});if(!ents.length)return;
      out+=SZH[s]+" · "+s+"\n";ents.forEach(function(e){out+="  "+e.text+(e.loc?" ("+e.loc+")":"")+"\n";});out+="\n";
    });
  }
  var pm={};projs.forEach(function(p){pm[p.id]={p:p,ents:pents[p.id]||[],ss:[]};});
  sess.forEach(function(s){if(s.pt){var p=null;for(var i=0;i<projs.length;i++){if(projs[i].title===s.pt){p=projs[i];break;}}if(p&&pm[p.id])pm[p.id].ss.push(s);}});
  var hasProj=false;for(var k in pm){if(pm[k].ents.length||pm[k].ss.length){hasProj=true;break;}}
  if(hasProj){
    out+="进行中 · Projects\n\n";
    for(var k in pm){var obj=pm[k];if(!obj.ents.length&&!obj.ss.length)continue;out+="【"+obj.p.title+"】\n\n";obj.ents.forEach(function(e){out+=e.at+"\n"+e.text+"\n\n";});obj.ss.forEach(function(s){out+=s.at+"  "+s.et+"  ("+fmt(s.dur)+")\n"+s.text+"\n\n";});}
  }
  var free=sess.filter(function(s){return !s.pt;});
  if(free.length){out+="练习 · Practice\n\n";free.forEach(function(s){out+=s.et+(s.au?" — "+s.au:"")+"  "+s.at+"  ("+fmt(s.dur)+")\n"+s.text+"\n\n";});}
  return out.trim();
}

function showTab(tab){
  document.querySelectorAll(".stab").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-tab")===tab);});
  document.getElementById("tab-prev").style.display=tab==="prev"?"flex":"none";
  document.getElementById("tab-prev-footer").style.display=tab==="prev"?"block":"none";
  document.getElementById("tab-txt").style.display=tab==="txt"?"flex":"none";
  document.getElementById("tab-txt-footer").style.display=tab==="txt"?"block":"none";
}

document.querySelectorAll(".stab").forEach(function(b){b.onclick=function(){showTab(b.getAttribute("data-tab"));};});
document.getElementById("expbtn").onclick=function(){
  document.getElementById("ecard").innerHTML=buildCard();
  document.getElementById("etextbox").value=buildText();
  document.getElementById("emodal").style.display="flex";
  showTab("prev");
};
document.getElementById("eclose").onclick=function(){document.getElementById("emodal").style.display="none";};

document.getElementById("copybtn").onclick=function(){
  var txt=document.getElementById("etextbox").value;var self=this;
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){self.textContent="✓ 已复制";self.classList.add("done");setTimeout(function(){self.textContent="复制全文";self.classList.remove("done");},2000);});
  } else {
    var ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;opacity:0;top:0;left:0;";
    document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);
    self.textContent="✓ 已复制";self.classList.add("done");setTimeout(function(){self.textContent="复制全文";self.classList.remove("done");},2000);
  }
};
</script>
